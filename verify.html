<div class="glass-card rounded-[2.5rem] p-8 md:p-12 text-center">
<div id="verification-icon" class="mb-6">
<span class="material-symbols-outlined text-primary text-6xl animate-pulse">pending</span>
</div>
<h1 id="verification-title" class="text-3xl font-headline font-extrabold tracking-tighter lowercase mb-4">verifying...</h1>
<p id="verification-message" class="text-on-surface-variant lowercase leading-relaxed">
we're confirming your email address. this will only take a second.
</p>
<div id="action-container" class="mt-8 hidden">
<a href="login.html" class="inline-block bg-gradient-to-r from-primary to-primary-dim px-8 py-4 rounded-xl text-on-primary font-bold text-lg lowercase shadow-[0_0_30px_rgba(143,245,255,0.2)] hover:scale-[1.02] active:scale-95 transition-all text-center">
go to login
</a>
</div>
</div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
const urlParams = new URLSearchParams(window.location.search);
const token = urlParams.get('token');
const titleEl = document.getElementById('verification-title');
const messageEl = document.getElementById('verification-message');
const iconEl = document.getElementById('verification-icon');
const actionEl = document.getElementById('action-container');

if (token) {
fetch(`https://paddle-cockroach-bouncrrr.onrender.com/verify?token=${token}`)
.then(response => response.text())
.then(message => {
if (message.includes('email verified successfully')) {
titleEl.textContent = 'success!';
messageEl.textContent = 'your email has been verified successfully. you can now log in to your account.';
iconEl.innerHTML = '<span class="material-symbols-outlined text-primary text-6xl">check_circle</span>';
actionEl.classList.remove('hidden');
} else {
titleEl.textContent = 'notice';
messageEl.textContent = message.toLowerCase();
iconEl.innerHTML = '<span class="material-symbols-outlined text-primary text-6xl">info</span>';
}
})
.catch(error => {
console.error('Error:', error);
titleEl.textContent = 'error';
messageEl.textContent = 'an error occurred. please try again later or contact support.';
iconEl.innerHTML = '<span class="material-symbols-outlined text-error text-6xl">error</span>';
});
} else {
titleEl.textContent = 'invalid link';
messageEl.textContent = 'no verification token found. please check your email for the correct link.';
iconEl.innerHTML = '<span class="material-symbols-outlined text-error text-6xl">warning</span>';
}
});
</script>
