<script>
document.addEventListener('DOMContentLoaded', async function () {
const token = localStorage.getItem('userToken');
const email = localStorage.getItem('userEmail');

if (!token) {
const redirectUrl = encodeURIComponent(window.location.href);
window.location.href = `login.html?redirect=${redirectUrl}`;
return;
}

if (email) {
document.getElementById('user-email-display').textContent = email;
}

// Initial data load
loadMarketingOptInStatus();
loadSubscriptionStatus();
loadRegisteredMachines();

// Event Listeners
document.getElementById('update-email-preferences').addEventListener('click', updateMarketingOptInStatus);
document.getElementById('manage-subscription').addEventListener('click', manageSubscription);
document.getElementById('show-password-form').addEventListener('click', function() {
this.classList.add('hidden');
document.getElementById('password-change-form').classList.remove('hidden');
});
document.getElementById('password-change-form').addEventListener('submit', handleChangePassword);
});

async function secureFetch(url, options = {}) {
let token = await refreshTokenIfNeeded();
options.headers = {...options.headers, 'Authorization': `Bearer ${token}`};
return fetch(url, options).then(response => {
if (!response.ok && response.status === 401) {
handleLogout();
throw new Error('session expired');
}
return response.json();
});
}

async function refreshTokenIfNeeded() {
let token = localStorage.getItem('userToken');
if (!token || tokenExpiringSoon(token)) {
try {
const response = await fetch('https://paddle-cockroach-bouncrrr.onrender.com/api/refresh-token', {
method: 'POST',
headers: {
'Content-Type': 'application/json',
'Authorization': `Bearer ${token}`
}
});
const data = await response.json();
if (response.ok) {
localStorage.setItem('userToken', data.newToken);
return data.newToken;
} else {
handleLogout();
return null;
}
} catch (e) {
handleLogout();
return null;
}
}
return token;
}

function tokenExpiringSoon(token) {
try {
const payload = JSON.parse(atob(token.split('.')[1]));
const exp = payload.exp;
const now = Date.now() / 1000;
return exp < now + 300;
} catch (e) { return true; }
}

async function loadMarketingOptInStatus() {
try {
const data = await secureFetch('https://paddle-cockroach-bouncrrr.onrender.com/api/get-marketing-preferences', { method: 'GET' });
document.getElementById('marketing-emails').checked = data.marketingOptIn;
} catch (error) { console.error('failed to fetch marketing opt-in', error); }
}

async function updateMarketingOptInStatus(e) {
e.preventDefault();
const marketingOptIn = document.getElementById('marketing-emails').checked;
const msgEl = document.getElementById('email-preference-message');

try {
const responseMessage = await secureFetch('https://paddle-cockroach-bouncrrr.onrender.com/api/update-marketing-preferences', {
method: 'POST',
headers: { 'Content-Type': 'application/json' },
body: JSON.stringify({ marketingOptIn })
});
msgEl.textContent = responseMessage;
setTimeout(() => { msgEl.textContent = ''; }, 3000);
} catch (error) { console.error('update failed', error); }
}

async function loadSubscriptionStatus() {
try {
const data = await secureFetch('https://paddle-cockroach-bouncrrr.onrender.com/api/get-subscription-status', { method: 'GET' });
let status = data.status;
if (!status || status === 'null' || status === 'NULL') status = 'no subscription';

const statusEl = document.getElementById('subscription-status');
const statusContainer = document.getElementById('subscription-status-container');
statusEl.textContent = status;
statusEl.classList.remove('hidden');
if (statusContainer) statusContainer.style.display = 'none';

// Color styling for status
if (status === 'active' || status === 'trialing') {
statusEl.classList.add('text-primary');
} else if (status === 'canceled' || status === 'past_due') {
statusEl.classList.add('text-error');
}

updateManageSubscriptionButton(status, data.trialStarted);
} catch (error) {
console.error('failed to fetch sub status', error);
const statusEl = document.getElementById('subscription-status');
const statusContainer = document.getElementById('subscription-status-container');
statusEl.textContent = 'failed to load';
statusEl.classList.remove('hidden');
if (statusContainer) statusContainer.style.display = 'none';
}
}

function updateManageSubscriptionButton(status, trialStarted) {
const btn = document.getElementById('manage-subscription');
switch (status) {
case 'active':
case 'trialing':
btn.textContent = 'cancel subscription';
btn.classList.replace('btn-primary', 'btn-secondary');
btn.classList.add('text-error', 'border-error/20');
break;
case 'canceled':
btn.textContent = trialStarted ? 're-subscribe' : 'start subscription';
break;
case 'no subscription':
btn.textContent = 'subscribe';
break;
default:
btn.textContent = 'manage';
break;
}
}

async function manageSubscription() {
const status = document.getElementById('subscription-status').textContent;
if (status === 'active' || status === 'trialing') {
const msg = status === 'active' ? 'cancel subscription? will take effect at next billing date.' : 'cancel trial? this cannot be undone.';
if (confirm(msg.toLowerCase())) {
await cancelSubscription();
}
} else {
window.location.href = 'index.html#pricing';
}
}

async function cancelSubscription() {
try {
const response = await fetch('https://paddle-cockroach-bouncrrr.onrender.com/api/cancel-subscription', {
method: 'POST',
headers: {
'Content-Type': 'application/json',
'Authorization': `Bearer ${localStorage.getItem('userToken')}`
},
body: JSON.stringify({ effectiveFrom: 'next_billing_period' })
});

if (response.ok) {
alert('subscription will be canceled at the next billing date.');
loadSubscriptionStatus();
} else {
const err = await response.json();
alert('failed: ' + err.error);
}
} catch (error) { alert('an error occurred.'); }
}

async function loadRegisteredMachines() {
try {
const machines = await secureFetch('https://paddle-cockroach-bouncrrr.onrender.com/api/get-registered-machines', { method: 'GET' });
const container = document.getElementById('machines-list');
container.innerHTML = '';

if (machines.length === 0) {
container.innerHTML = '<p class="text-on-surface-variant text-center py-8">no devices registered yet.</p>';
return;
}

machines.forEach(machine => {
const el = document.createElement('div');
el.className = 'flex items-center justify-between p-4 bg-black/20 rounded-xl border border-white/5 group hover:border-primary/20 transition-all';
el.innerHTML = `
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-on-surface-variant">laptop_mac</span>
<div>
<p class="font-bold text-white lowercase">${machine.machine_name}</p>
<p class="text-[10px] uppercase tracking-wider text-on-surface-variant">registered ${new Date(machine.registered_at).toLocaleDateString()}</p>
</div>
</div>
<div class="flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
<button onclick="renameMachine('${machine.machine_id}')" class="p-2 hover:text-primary transition-colors"><span class="material-symbols-outlined text-sm">edit</span></button>
<button onclick="unregisterMachine('${machine.machine_id}')" class="p-2 hover:text-error transition-colors"><span class="material-symbols-outlined text-sm">delete</span></button>
</div>
`;
container.appendChild(el);
});
} catch (error) { console.error('failed to load machines', error); }
}

function renameMachine(id) {
const name = prompt('enter new name:');
if (!name) return;
fetch('https://paddle-cockroach-bouncrrr.onrender.com/api/update-machine-name', {
method: 'POST',
headers: {
'Authorization': `Bearer ${localStorage.getItem('userToken')}`,
'Content-Type': 'application/json'
},
body: JSON.stringify({ machine_id: id, new_machine_name: name })
}).then(r => r.ok && loadRegisteredMachines());
}

function unregisterMachine(id) {
if (!confirm('unregister this device?')) return;
fetch('https://paddle-cockroach-bouncrrr.onrender.com/api/unregister-machine', {
method: 'POST',
headers: {
'Authorization': `Bearer ${localStorage.getItem('userToken')}`,
'Content-Type': 'application/json'
},
body: JSON.stringify({ machine_id: id })
}).then(r => r.ok && loadRegisteredMachines());
}

async function handleChangePassword(e) {
e.preventDefault();
const pass = document.getElementById('new-password').value;
const conf = document.getElementById('confirm-new-password').value;
if (pass !== conf) { alert('passwords do not match'); return; }

try {
const response = await fetch('https://paddle-cockroach-bouncrrr.onrender.com/api/change-password', {
method: 'POST',
headers: {
'Content-Type': 'application/json',
'Authorization': `Bearer ${localStorage.getItem('userToken')}`
},
body: JSON.stringify({ password: pass })
});

if (response.ok) {
alert('password updated successfully.');
document.getElementById('password-change-form').classList.add('hidden');
document.getElementById('show-password-form').classList.remove('hidden');
} else { alert('failed to update password.'); }
} catch (e) { alert('error occurred.'); }
}

function handleLogout() {
    window.bouncrrrAuth.handleLogout();
}
</script>
