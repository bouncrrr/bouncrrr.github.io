<form id="auth-form" class="space-y-4">
<div class="space-y-1">
<label class="text-xs font-label uppercase tracking-widest text-[#8ff5ff]/60 px-1" for="email">email</label>
<input type="email" id="email" required class="input-field" placeholder="producer@studio.co">
</div>

<div class="space-y-1">
<div class="flex justify-between px-1">
<label class="text-xs font-label uppercase tracking-widest text-[#8ff5ff]/60" for="password">password</label>
<a id="forgot-password-link" href="forgotpassword.html" class="text-[10px] uppercase tracking-widest text-on-surface-variant hover:text-primary-dim transition-colors">forgot?</a>
</div>
<input type="password" id="password" required class="input-field" placeholder="••••••••">
</div>

<div id="signup-fields" class="hidden space-y-4">
<div class="space-y-1">
<label class="text-xs font-label uppercase tracking-widest text-[#8ff5ff]/60 px-1" for="confirm-password">confirm password</label>
<input type="password" id="confirm-password" class="input-field" placeholder="••••••••">
</div>

<label class="flex items-center gap-3 px-1 cursor-pointer group">
<div class="relative flex items-center">
<input type="checkbox" id="marketing-opt-in" class="peer h-5 w-5 rounded-lg border-primary/20 bg-black/40 text-primary focus:ring-primary/20">
</div>
<span class="text-sm text-on-surface-variant group-hover:text-white transition-colors lowercase">stay in the loop with news and offers!</span>
</label>
</div>

</div>

login
</button>

<div class="mt-8 text-center bg-white/5 py-4 rounded-2xl border border-white/5">
<p class="text-sm text-on-surface-variant lowercase">
<span id="toggle-text">don't have an account?</span>
<button type="button" id="toggle-form-button" class="text-primary font-bold hover:underline">sign up</button>
</p>

</div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
const form = document.getElementById('auth-form');
const formTitle = document.getElementById('form-title');
const formSubtitle = document.getElementById('form-subtitle');
const signupFields = document.getElementById('signup-fields');
const submitButton = document.getElementById('submit-button');
const toggleButton = document.getElementById('toggle-form-button');
const toggleText = document.getElementById('toggle-text');
const authError = document.getElementById('auth-error');
const forgotPasswordLink = document.getElementById('forgot-password-link');

let isSignup = false;

// Check URL params for initial state
const urlParams = new URLSearchParams(window.location.search);
if (urlParams.get('type') === 'signup') {
toggleForm(true);
}

function toggleForm(forceSignup = null) {
isSignup = forceSignup !== null ? forceSignup : !isSignup;
authError.classList.add('hidden');

if (isSignup) {
formTitle.textContent = 'sign up';
formSubtitle.textContent = 'join the community of producers.';
signupFields.classList.remove('hidden');
submitButton.textContent = 'create account';
toggleText.textContent = 'already have an account?';
toggleButton.textContent = 'login';
forgotPasswordLink.classList.add('hidden');
} else {
formTitle.textContent = 'login';
formSubtitle.textContent = 'welcome back to the lab.';
signupFields.classList.add('hidden');
submitButton.textContent = 'login';
toggleText.textContent = "don't have an account?";
toggleButton.textContent = 'sign up';
forgotPasswordLink.classList.remove('hidden');
}
}

toggleButton.addEventListener('click', () => toggleForm());

form.addEventListener('submit', async (e) => {
e.preventDefault();
authError.classList.add('hidden');

const email = document.getElementById('email').value;
const password = document.getElementById('password').value;
const confirmPassword = document.getElementById('confirm-password').value;
const marketingOptIn = document.getElementById('marketing-opt-in').checked;

if (isSignup && password !== confirmPassword) {
showError('passwords do not match');
return;
}

const apiEndpoint = isSignup ? 
'https://paddle-cockroach-bouncrrr.onrender.com/api/signup' : 
'https://paddle-cockroach-bouncrrr.onrender.com/api/website-login';

const payload = { email, password, marketingOptIn };
if (isSignup) payload.confirmPassword = confirmPassword;

try {
submitButton.disabled = true;
submitButton.textContent = isSignup ? 'creating account...' : 'logging in...';

const response = await fetch(apiEndpoint, {
method: 'POST',
headers: { 'Content-Type': 'application/json' },
body: JSON.stringify(payload)
});

const data = await response.json();

if (!response.ok) {
throw new Error(data.error || 'authentication failed');
}

if (data.token) {
localStorage.setItem('userToken', data.token);
localStorage.setItem('userEmail', email);

const returnUrl = urlParams.get('redirect');
window.location.href = returnUrl || 'index.html';
} else if (isSignup) {
// Signup successful but maybe no token yet (email verification?)
toggleForm(false);
showError('sign up successful! please login.', 'success');
}
} catch (error) {
showError(error.message);
} finally {
submitButton.disabled = false;
submitButton.textContent = isSignup ? 'create account' : 'login';
}
});

function showError(msg, type = 'error') {
authError.textContent = msg;
authError.classList.remove('hidden');
if (type === 'success') {
authError.classList.remove('bg-error/10', 'text-error', 'border-error/20');
authError.classList.add('bg-primary/10', 'text-primary', 'border-primary/20');
} else {
authError.classList.add('bg-error/10', 'text-error', 'border-error/20');
authError.classList.remove('bg-primary/10', 'text-primary', 'border-primary/20');
}
}
});
</script>
