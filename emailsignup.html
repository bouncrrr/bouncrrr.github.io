<form id="signup-form" class="space-y-6">
<div class="space-y-1">
<label class="text-xs font-label uppercase tracking-widest text-[#8ff5ff]/60 px-1" for="email">email</label>
<input type="email" id="email" required class="input-field" placeholder="producer@studio.co">
</div>

<div id="auth-error" class="hidden text-sm lowercase text-center p-3 rounded-xl border"></div>

<button type="submit" id="submit-button" class="w-full bg-gradient-to-r from-primary to-primary-dim py-4 rounded-xl text-on-primary font-bold text-lg lowercase shadow-[0_0_30px_rgba(143,245,255,0.2)] hover:scale-[1.02] active:scale-95 transition-all">
notify me
</button>
</form>
</div>
</div>

<script>
document.getElementById('signup-form').addEventListener('submit', async function(e) {
e.preventDefault();
const email = document.getElementById('email').value;
const btn = document.getElementById('submit-button');
const msgEl = document.getElementById('auth-error');
const consent = true;

try {
btn.disabled = true;
btn.textContent = 'subscribing...';
msgEl.classList.add('hidden');

const response = await fetch('https://paddle-cockroach-bouncrrr.onrender.com/api/email-signup', {
method: 'POST',
headers: { 'Content-Type': 'application/json' },
body: JSON.stringify({ email, consent }),
});

const data = await response.json();

if (response.ok) {
showMsg(data.message || 'thank you for signing up!', 'success');
btn.textContent = 'signed up';
} else {
if (response.status === 409) {
showMsg('this email is already signed up', 'error');
} else {
showMsg(data.error || 'there was an issue. please try again', 'error');
}
btn.disabled = false;
btn.textContent = 'notify me';
}
} catch (error) {
showMsg('an error occurred. please try again later.', 'error');
btn.disabled = false;
btn.textContent = 'notify me';
}
});

function showMsg(msg, type) {
const msgEl = document.getElementById('auth-error');
msgEl.textContent = msg;
msgEl.classList.remove('hidden');
if (type === 'success') {
msgEl.classList.add('bg-primary/10', 'text-primary', 'border-primary/20');
} else {
msgEl.classList.add('bg-error/10', 'text-error', 'border-error/20');
}
}
</script>
