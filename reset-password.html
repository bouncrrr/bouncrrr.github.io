<body class="bg-background text-on-background selection:bg-primary/30 flex items-center justify-center min-h-screen p-6">
<div class="mesh-gradient"></div>

<!-- NavBar -->
<nav class="fixed top-0 w-full z-50 bg-[#060e20]/80 backdrop-blur-xl border-b border-white/5">
<div class="flex justify-between items-center px-6 py-4 max-w-7xl mx-auto">

<div class="max-w-md w-full animate-in fade-in zoom-in duration-500">
<div class="glass-card rounded-[2.5rem] p-8 md:p-12">

<h1 class="text-3xl font-headline font-extrabold tracking-tighter lowercase mb-2">reset password</h1>
<p class="text-on-surface-variant lowercase">enter your new password below.</p>
</div>

<form id="password-reset-form" class="space-y-4">
<div class="space-y-1">
<label class="text-xs font-label uppercase tracking-widest text-[#8ff5ff]/60 px-1" for="new-password">new password</label>
<input type="password" id="new-password" required class="input-field" placeholder="••••••••">
</div>

<div class="space-y-1">
<label class="text-xs font-label uppercase tracking-widest text-[#8ff5ff]/60 px-1" for="confirm-new-password">confirm password</label>
<input type="password" id="confirm-new-password" required class="input-field" placeholder="••••••••">
</div>

<div id="auth-error" class="hidden text-sm lowercase text-center p-3 rounded-xl border"></div>

<button type="submit" id="submit-button" class="w-full bg-gradient-to-r from-primary to-primary-dim py-4 mt-4 rounded-xl text-on-primary font-bold text-lg lowercase shadow-[0_0_30px_rgba(143,245,255,0.2)] hover:scale-[1.02] active:scale-95 transition-all">
update password
</button>
</form>
</div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
const form = document.getElementById('password-reset-form');
const btn = document.getElementById('submit-button');
const msgEl = document.getElementById('auth-error');

form.addEventListener('submit', async function(e) {
e.preventDefault();
const newPassword = document.getElementById('new-password').value;
const confirmPassword = document.getElementById('confirm-new-password').value;
const urlParams = new URLSearchParams(window.location.search);
const token = urlParams.get('token') || urlParams.get('resetToken'); // Support both naming conventions

if (newPassword !== confirmPassword) {
showMsg('passwords do not match.', 'error');
return;
}

if (!token) {
showMsg('invalid or missing token.', 'error');
return;
}

try {
btn.disabled = true;
btn.textContent = 'updating...';
msgEl.classList.add('hidden');

const response = await fetch(`https://paddle-cockroach-bouncrrr.onrender.com/api/reset-password/${token}`, {
method: 'POST',
headers: {'Content-Type': 'application/json'},
body: JSON.stringify({ password: newPassword })
});

if (response.ok) {
showMsg('password updated successfully! redirecting...', 'success');
setTimeout(() => { window.location.href = 'login.html'; }, 2000);
} else {
const errorData = await response.json();
showMsg(errorData.error || 'failed to update password.', 'error');
btn.disabled = false;
btn.textContent = 'update password';
}
} catch (error) {
showMsg('an error occurred. please try again later.', 'error');
btn.disabled = false;
btn.textContent = 'update password';
}
});

function showMsg(msg, type) {
msgEl.textContent = msg;
msgEl.classList.remove('hidden');
if (type === 'success') {
msgEl.classList.add('bg-primary/10', 'text-primary', 'border-primary/20');
} else {
msgEl.classList.add('bg-error/10', 'text-error', 'border-error/20');
}
}
});
</script>
